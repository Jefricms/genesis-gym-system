<!DOCTYPE html>
<html lang="es">
<script>
    // ... (variables y configuración igual)

    // FUNCIONES CON URL ACTUALIZADA A RENDER
    function processLogin(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        // URL ACTUALIZADA
        fetch('https://genesis-gym-system.onrender.com/api/login', {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
        })
        .then(r => r.json())
        .then(data => { 
            localStorage.setItem('usuario_activo', JSON.stringify(data.user));
            completarAutenticacionExito(data.user); 
        })
        .catch(err => showToast("Error de conexión con Render.", "error"));
    }

    function processRegister(e) {
        e.preventDefault();
        const nombre = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        // URL ACTUALIZADA
        fetch('https://genesis-gym-system.onrender.com/api/register', {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre: nombre, email: email })
        })
        .then(r => r.json())
        .then(data => { 
            localStorage.setItem('usuario_activo', JSON.stringify(data.user));
            completarAutenticacionExito(data.user); 
        })
        .catch(err => showToast("Error en registro.", "error"));
    }

    // He actualizado también los fetch de metodos e historial dentro de completarAutenticacion
